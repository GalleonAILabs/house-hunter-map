// Info panel minimize toggle. On narrow screens it overlaps the search box, so
// it starts minimized on phones (<=640px wide) and expanded on desktop. The
// chevron in the title bar collapses it to just the title. Choice is remembered.
var panel=document.getElementById('panel');
function setPanelMin(min){
  panel.classList.toggle('min',min);
  document.getElementById('pchev').innerHTML=min?'&#9654;':'&#9660;';
}

setPanelMin(startMin);
document.getElementById('ptoggle').onclick=function(){

  setPanelMin(min);
  localStorage.setItem('hh_panel_min',min?'1':'0');
};

var LC={'Barrie':'#0072C0','Lakeshore West':'#00B050','Lakeshore East':'#548235',
'Kitchener':'#7030A0','Milton':'#ED7D31','Richmond Hill':'#C00000','Stouffville':'#00B0B0'};
function e(s){return s==null?'':String(s);}
// Display stars: filled gold up to n, hollow to 5. Returns HTML.
function stars(n){n=parseInt(n,10);if(isNaN(n)||n<1)return '<span style="color:#bbb">no rating</span>';
  var s='';for(var i=1;i<=5;i++)s+=(i<=n?'\u2605':'\u2606');return '<span class="stars">'+s+'</span>';}

// ---- Card write-back inputs (rate / note / say no) ----------------------
// Three inputs at the bottom of every property card. They write back to the
// House Hunter sheet through the Apps Script backend (WEBAPP). Until that web
// app is deployed (WEBAPP empty or still the unreplaced token), each input
// falls back to a pre-filled mailto so a click is never dead.
function backendLive(){return WEBAPP && WEBAPP.indexOf('http')===0;}
function send(params,el,okMsg){
  var qs=Object.keys(params).map(function(k){
    return encodeURIComponent(k)+'='+encodeURIComponent(params[k]);}).join('&');
  // no-cors: fire-and-forget GET to the Apps Script /exec. We cannot read the
  // response cross-origin, but the side-effect (sheet write) happens. We show a
  // local confirmation immediately.
  fetch(WEBAPP+'?'+qs,{mode:'no-cors'}).catch(function(){});
  if(el){el.textContent=okMsg;}
}
function mailto(subject,body){
  window.location.href='mailto:mark@galleonglobal.ai?subject='
    +encodeURIComponent(subject)+'&body='+encodeURIComponent(body||'');
}
function buildActs(p){
  return '<div class="acts" data-row="'+e(p.row)+'">'
    +'<div class="actrow rate-row"><span style="color:#555">My rating:</span>'
    +'<span class="starpick"></span></div>'
    +'<div class="actrow"><input class="ninp" type="text" placeholder="Add a note">'
    +'<button class="abtn addn">Add note</button></div>'
    +'<div class="actrow"><button class="abtn nob sayno">Say no</button>'
    +'<span class="amsg"></span></div></div>';
}
function wireActs(root,p){
  if(!root)return;
  var box=root.querySelector('.acts'); if(!box)return;
  var msg=box.querySelector('.amsg');
  var who=WHO();
  // Star picker. Realtor has no personal rating, so hide that row.
  var rateRow=box.querySelector('.rate-row');
  var pick=box.querySelector('.starpick');
  if(who==='Realtor'){ if(rateRow)rateRow.style.display='none'; }
  else if(pick){
    var cur=parseInt(who==='Katie'?p.katieRank:p.markRank,10);
    if(isNaN(cur))cur=0;
    pick.innerHTML='';
    for(var i=1;i<=5;i++){(function(n){
      var s=document.createElement('span');s.className='clk';
      s.innerHTML=(n<=cur?'\u2605':'\u2606');
      s.title=n+' star'+(n>1?'s':'');
      s.onclick=function(){
        // optimistic fill
        var sp=pick.querySelectorAll('.clk');
        for(var k=0;k<sp.length;k++)sp[k].innerHTML=(k<n?'\u2605':'\u2606');
        if(who==='Katie')p.katieRank=n; else p.markRank=n;
        if(backendLive()){
          send({action:'rate',row:p.row,who:who,stars:n,
                addr:p.address},msg,who+' rated '+n+'\u2605');
        }else{
          mailto('House Hunter rating: '+p.address,
            who+' rates '+p.address+' as '+n+' out of 5 stars.');
        }
      };
      pick.appendChild(s);
    })(i);}
  }
  // Add note.
  var inp=box.querySelector('.ninp'), addn=box.querySelector('.addn');
  if(addn)addn.onclick=function(){
    var note=(inp.value||'').trim(); if(!note){inp.focus();return;}
    if(backendLive()){
      send({action:'note',row:p.row,note:note,who:who,addr:p.address},
        msg,'Note saved');
      inp.value='';
    }else{
      mailto('House Hunter note: '+p.address,
        who+' note on '+p.address+':\n\n'+note);
    }
  };
  // Say no. Always asks WHY: the reason is stored so a grey pin shows who
  // said no and the reason, readable straight off the card next refresh.
  var no=box.querySelector('.sayno');
  if(no)no.onclick=function(){
    var reason=window.prompt('Why say no to '+p.address+'?\n('+who+')');
    if(reason===null)return;            // cancelled
    reason=reason.trim();
    if(!reason){alert('A reason is required to say no.');return;}
    p.rejBy=who; p.rejReason=reason; p.status='Rejected';
    if(backendLive()){
      send({action:'no',row:p.row,who:who,reason:reason,addr:p.address},
        msg,'Marked no');
    }else{
      mailto('House Hunter: say NO to '+p.address,
        who+' says no to '+p.address+'.\nReason: '+reason
        +'\n\nPlease set Status=Rejected, Rejected By='+who
        +', Reject Reason as above.');
    }
  };
}

// Town/address search via OpenStreetMap Nominatim (free, no key). Pans the map.
var searchMarker=null;
function doSearch(){
  var q=document.getElementById('q').value.trim();if(!q)return;
  var sm=document.getElementById('smsg');sm.textContent=' searching...';
  var url='https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=ca&q='
    +encodeURIComponent(q+', Ontario, Canada');
  fetch(url).then(function(r){return r.json();}).then(function(j){
    if(!j.length){sm.textContent=' not found';return;}
    var la=parseFloat(j[0].lat),lo=parseFloat(j[0].lon);
    map.setView([la,lo],12);
    if(searchMarker)map.removeLayer(searchMarker);
    searchMarker=L.marker([la,lo]).addTo(map).bindPopup(e(j[0].display_name)).openPopup();
    sm.textContent='';
  }).catch(function(){sm.textContent=' search error';});
}
document.getElementById('qgo').onclick=doSearch;
document.getElementById('q').addEventListener('keydown',function(ev){if(ev.key==='Enter')doSearch();});
document.getElementById('qclear').onclick=function(){
  if(searchMarker){map.removeLayer(searchMarker);searchMarker=null;}
  document.getElementById('q').value='';document.getElementById('smsg').textContent='';
};

function render(data){
  var gProps=L.layerGroup().addTo(map),
      gLines=L.layerGroup().addTo(map), gStn=L.layerGroup().addTo(map),
      gHwy=L.layerGroup().addTo(map);
  var pins=[]; // {marker, tier, mark, katie}
  data.lines.forEach(function(ln){if(ln.points.length<2)return;
  L.polyline(ln.points,{color:LC[ln.name]||'#888',weight:4,opacity:.7})
  .bindPopup('<b>'+e(ln.name)+' line</b>').addTo(gLines);});
  data.stations.forEach(function(s){var c=s.existing?'#1a73e8':'#999';
  L.circleMarker([s.lat,s.lon],{radius:s.existing?5:4,color:c,fillColor:c,
  fillOpacity:s.existing?.9:.4,weight:1}).bindPopup('<b>'+e(s.name)+'</b><br>'+e(s.muni)
  +'<br><i>'+e(s.lines)+'</i>').addTo(gStn);});
  if(data.hwy413.length>1){var pts=data.hwy413.map(function(i){return[i.lat,i.lon];});
  L.polyline(pts,{color:'#ff6600',weight:5,opacity:.8,dashArray:'8,6'})
  .bindPopup('<b>Highway 413 (proposed)</b><br>Approximate corridor').addTo(gHwy);
  data.hwy413.forEach(function(i){L.circleMarker([i.lat,i.lon],{radius:4,color:'#ff6600',
  fillColor:'#ff6600',fillOpacity:.7,weight:1}).bindPopup('<b>'+e(i.name)+'</b><br>'
  +e(i.cross)+'<br>'+e(i.muni)).addTo(gHwy);});}

  var b=[];
  // Ranking key: START from the overall Fit Score (the pipeline's /8 scoring),
  // then layer Katie's and Mark's 5-star ratings on top to refine.
  //   base  = fit fraction * 10   (0-10, the foundation)
  //   bonus = avg of Mark/Katie stars (0-5, the human refinement)
  // Top 5 = highest combined, Bottom 5 = lowest. Rejected are grey and excluded.
  function fitFrac(p){
    var m=String(p.fit||'').match(/(\d+)\s*\/\s*(\d+)/);
    if(!m)return null; var n=parseFloat(m[1]),d=parseFloat(m[2]);
    return d>0?n/d:null;
  }
  function combined(p){
    var f=fitFrac(p);
    var mr=parseFloat(p.markRank), kr=parseFloat(p.katieRank), hv=[];
    if(!isNaN(mr))hv.push(mr); if(!isNaN(kr))hv.push(kr);
    var human=hv.length?hv.reduce(function(a,c){return a+c;},0)/hv.length:null;
    if(f==null && human==null) return null;
    return (f!=null?f*10:0) + (human!=null?human:0);
  }
  var ranked=data.properties.filter(function(p){
    var rej=String(p.status||'').toLowerCase().indexOf('reject')>=0;
    return !rej && combined(p)!=null;
  }).map(function(p){return {p:p,score:combined(p)};});
  var byHigh=ranked.slice().sort(function(a,c){return c.score-a.score;});
  var byLow=ranked.slice().sort(function(a,c){return a.score-c.score;});
  var topSet=new Set(byHigh.slice(0,5).map(function(x){return x.p;}));
  var botSet=new Set(byLow.slice(0,5).map(function(x){return x.p;}));
  botSet.forEach(function(p){if(topSet.has(p))botSet.delete(p);});

  data.properties.forEach(function(p){b.push([p.lat,p.lon]);
  var thisPin={marker:null,tier:null,priceNum:(typeof p.priceNum==='number'?p.priceNum:null),
    bedsNum:(typeof p.bedsNum==='number'?p.bedsNum:null),
    bathsNum:(typeof p.bathsNum==='number'?p.bathsNum:null),
    sqftNum:(typeof p.sqftNum==='number'?p.sqftNum:null),
    goMinNum:(typeof p.goMinNum==='number'?p.goMinNum:null),
    acresNum:(typeof p.acresNum==='number'?p.acresNum:null),
    fitMet:(typeof p.fitMet==='number'?p.fitMet:null),
    frontageNum:(typeof p.frontageNum==='number'?p.frontageNum:null),
    depthNum:(typeof p.depthNum==='number'?p.depthNum:null),
    dueNum:(typeof p.dueNum==='number'?p.dueNum:null),
    pitNum:(typeof p.pitNum==='number'?p.pitNum:null),
    features:String(p.features||'').toLowerCase(),
    statusRaw:String(p.status||'').toLowerCase(),
    mark:(p.markRank===''||p.markRank==null)?null:parseInt(p.markRank,10),
    katie:(p.katieRank===''||p.katieRank==null)?null:parseInt(p.katieRank,10)};
  var st=(p.status||'').toLowerCase();
  var rejected=(st.indexOf('reject')>=0||st.indexOf('pass')>=0||st==='no');
  var m5=parseInt(p.markRank,10)===5, k5=parseInt(p.katieRank,10)===5;
  var bothFive=!rejected&&m5&&k5, oneFive=!rejected&&(m5||k5)&&!bothFive;
  var isTop=topSet.has(p), isBot=botSet.has(p);
  var pc=rejected?'#9e9e9e':(isTop?'#137333':(isBot?'#c5221f':'#1a73e8'));
  var gm='https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(p.address);
  var fit=e(p.fit),fc=fit.indexOf('8/8')===0?' class="fit-pass"':'';
  var div=document.createElement('div');div.className='pop';
  div.innerHTML='<b>'+e(p.address)+'</b><br>'
  +(rejected&&(p.rejBy||p.rejReason)?'<div style="color:#c5221f;font-weight:600;margin:2px 0">'
    +e(p.rejBy||'Someone')+' said no'+(p.rejReason?': '+e(p.rejReason):'')+'</div>':'')
  +((p.markComments||p.katieComments)?'<div class="notebanner">'
    +(p.markComments?'<div><b>Mark:</b> '+e(p.markComments)+'</div>':'')
    +(p.katieComments?'<div><b>Katie:</b> '+e(p.katieComments)+'</div>':'')
    +'</div>':'')
  +'Price: '+e(p.price)
  +'<br><span'+fc+'>Fit: '+fit+'</span><br>Beds: '+e(p.beds)+' &nbsp; Baths: '+e(p.baths)
  +'<br>Sqft: '+e(p.sqft)+' &nbsp; Lot: '+e(p.lot)+(p.acres?' ('+e(p.acres)+' ac)':'')
  +'<br>Nearest GO: '+e(p.go)+' ('+e(p.goMin)+' min)<br>'
  +(p.features?'Features: '+e(p.features)+'<br>':'')
  +'Due at closing: '+e(p.dueClosing)+'<br>Monthly PIT: '+e(p.pit)+'<br>'
  +'Katie: '+stars(p.katieRank)+' &nbsp; Mark: '+stars(p.markRank)+'<br>'
  +(p.link?'<a href="'+e(p.link)+'" target="_blank">Listing</a> ':'')
  +(p.doc?'| <a href="'+e(p.doc)+'" target="_blank">Research</a> ':'')
  +'| <a href="'+gm+'" target="_blank">Google Maps</a>'
  +(p.image?'<br><img src="'+e(p.image)+'">':'');
  div.innerHTML+=buildActs(p);
  var marker, tier;
  if(bothFive||oneFive){
    var col=bothFive?'#f5b301':'#2e9e2e';
    var icon=L.divIcon({className:'',iconSize:[24,24],iconAnchor:[12,12],
      html:'<div class="pinstar" style="color:'+col+'">\u2605</div>'});
    marker=L.marker([p.lat,p.lon],{icon:icon}).bindPopup(div);
    tier=bothFive?'gold':'greenstar';
  } else {
    marker=L.circleMarker([p.lat,p.lon],{radius:9,color:'#fff',weight:2,fillColor:pc,
    fillOpacity:rejected?0.55:1}).bindPopup(div);
    tier=rejected?'grey':(isTop?'top':(isBot?'bottom':'other'));
  }
  thisPin.marker=marker; thisPin.tier=tier;
  marker.on('popupopen',function(ev){wireActs(ev.popup.getElement(),p);});
  pins.push(thisPin);});

  // ---- Filter panel ------------------------------------------------------
  // Two filter dimensions, combined with AND:
  //   Category: gold / greenstar / top / bottom / other / grey
  //   My rating: no rating / 1..5 stars, for the CURRENT "I am" user.
  //             (Realtor has no personal ratings, so the rating filter is
  //             ignored when "I am: Realtor".)
  var catKeys=['gold','greenstar','top','bottom','other','grey'];
  var catState={}; catKeys.forEach(function(k){catState[k]=true;});
  var rateKeys=['none','1','2','3','4','5'];
  var rateState={}; rateKeys.forEach(function(k){rateState[k]=true;});
  var showLines=true, showStn=true, showHwy=true;

  // Numeric range filters: each key maps to {min,max} (null = no bound) and the
  // pin property it reads. Full manual control, AND-combined with everything.
  var ranges={
    price:{min:null,max:null,prop:'priceNum'},
    fit:  {min:null,max:null,prop:'fitMet'},
    beds: {min:null,max:null,prop:'bedsNum'},
    baths:{min:null,max:null,prop:'bathsNum'},
    sqft: {min:null,max:null,prop:'sqftNum'},
    acres:{min:null,max:null,prop:'acresNum'},
    go:   {min:null,max:null,prop:'goMinNum'},
    front:{min:null,max:null,prop:'frontageNum'},
    depth:{min:null,max:null,prop:'depthNum'},
    due:  {min:null,max:null,prop:'dueNum'},
    pit:  {min:null,max:null,prop:'pitNum'}
  };
  // Must-have toggles from the family brief. When ON, each requires its test to
  // pass; a pin with no parseable value for that field fails the must-have.
  var must={beds4:false,sqft1800:false,go20:false,acre05:false};
  var featText='';  // features keyword (lowercase substring)

  function myRating(pin){
    var w=WHO();
    if(w==='Katie')return pin.katie;
    if(w==='Mark')return pin.mark;
    return undefined; // Realtor: no personal rating dimension
  }
  function passRanges(pin){
    for(var k in ranges){var r=ranges[k];
      if(r.min==null&&r.max==null)continue;
      var v=pin[r.prop];
      if(v==null)return false;           // active bound + no value = hide
      if(r.min!=null&&v<r.min)return false;
      if(r.max!=null&&v>r.max)return false;
    }
    return true;
  }
  function passMust(pin){
    if(must.beds4 && !(pin.bedsNum!=null&&pin.bedsNum>=4))return false;
    if(must.sqft1800 && !(pin.sqftNum!=null&&pin.sqftNum>=1800))return false;
    if(must.go20 && !(pin.goMinNum!=null&&pin.goMinNum<=20))return false;
    if(must.acre05 && !(pin.acresNum!=null&&pin.acresNum>=0.5))return false;
    return true;
  }
  function applyFilters(){
    gProps.clearLayers();
    var shown=0;
    pins.forEach(function(pin){
      if(!catState[pin.tier])return;
      var mr=myRating(pin);
      if(mr!==undefined){
        var key=(mr==null||isNaN(mr))?'none':String(mr);
        if(!rateState[key])return;
      }
      if(!passRanges(pin))return;
      if(!passMust(pin))return;
      if(featText && pin.features.indexOf(featText)<0)return;
      gProps.addLayer(pin.marker);shown++;
    });
    if(showLines)gLines.addTo(map); else map.removeLayer(gLines);
    if(showStn)gStn.addTo(map); else map.removeLayer(gStn);
    if(showHwy)gHwy.addTo(map); else map.removeLayer(gHwy);
    var cnt=document.getElementById('count');
    if(cnt)cnt.textContent='('+shown+' of '+pins.length+' shown)';
  }

  var fp=document.getElementById('filterBody');
  function row(label,checked,onchange,swatch){
    var d=document.createElement('label');d.className='frow';
    d.innerHTML='<input type="checkbox" '+(checked?'checked':'')+'> '
      +(swatch||'')+'<span>'+label+'</span>';
    d.querySelector('input').addEventListener('change',function(){onchange(this.checked);});
    fp.appendChild(d);return d;
  }
  function hdr(t){var d=document.createElement('div');d.className='fhdr';d.textContent=t;fp.appendChild(d);}
  function dot(c){return '<i style="background:'+c+'"></i>';}
  function starsw(c){return '<i class="stsw" style="color:'+c+'">\u2605</i>';}

  // Parse a numeric filter entry. Tolerates "$1,200,000", "1.2M", "950k", "4".
  function parseNum(s){
    s=String(s||'').trim().toLowerCase().replace(/[$,\s]/g,'');
    if(!s)return null;
    var mult=1;
    if(s.slice(-1)==='m'){mult=1e6;s=s.slice(0,-1);}
    else if(s.slice(-1)==='k'){mult=1e3;s=s.slice(0,-1);}
    var n=parseFloat(s);
    return isNaN(n)?null:n*mult;
  }
  // Build one labelled min/max range row bound to ranges[key].
  function rangeRow(key,label,minPh,maxPh){
    var lab=document.createElement('div');lab.className='rnglab';lab.textContent=label;
    fp.appendChild(lab);
    var r=document.createElement('div');r.className='prow';
    r.innerHTML='<input class="pin mn" inputmode="numeric" placeholder="'+(minPh||'Min')+'">'
      +'<span>to</span><input class="pin mx" inputmode="numeric" placeholder="'+(maxPh||'Max')+'">';
    fp.appendChild(r);
    var mn=r.querySelector('.mn'), mx=r.querySelector('.mx');
    function sync(){ranges[key].min=parseNum(mn.value);ranges[key].max=parseNum(mx.value);applyFilters();}
    mn.addEventListener('input',sync); mx.addEventListener('input',sync);
    return {mn:mn,mx:mx};
  }

  hdr('Must-haves (brief)');
  var mustBoxes=[];
  mustBoxes.push(row('4+ beds',false,function(v){must.beds4=v;applyFilters();}).querySelector('input'));
  mustBoxes.push(row('1800+ sqft',false,function(v){must.sqft1800=v;applyFilters();}).querySelector('input'));
  mustBoxes.push(row('GO drive \u2264 20 min',false,function(v){must.go20=v;applyFilters();}).querySelector('input'));
  mustBoxes.push(row('0.5+ acre lot',false,function(v){must.acre05=v;applyFilters();}).querySelector('input'));

  hdr('Ranges (min / max)');
  rangeRow('price','Price ($)','Min','Max');
  rangeRow('fit','Fit score met (/8)','Min','Max');
  rangeRow('beds','Beds (total)');
  rangeRow('baths','Baths (total)');
  rangeRow('sqft','Sqft (above grade)');
  rangeRow('acres','Acreage');
  rangeRow('go','GO drive (min)');
  rangeRow('front','Frontage (ft)');
  rangeRow('depth','Depth (ft)');
  rangeRow('due','Due at closing ($)','Min','Max');
  rangeRow('pit','Monthly PIT ($)','Min','Max');

  hdr('Features keyword');
  var frow=document.createElement('div');frow.className='prow';
  frow.innerHTML='<input class="pin feat" placeholder="e.g. pool, shop, walkout">';
  fp.appendChild(frow);
  var featEl=frow.querySelector('.feat');
  featEl.addEventListener('input',function(){featText=featEl.value.trim().toLowerCase();applyFilters();});

  // Reset everything (ranges, must-haves, keyword) in one tap.
  var resetRow=document.createElement('div');resetRow.className='prow';
  resetRow.innerHTML='<button class="pclr" id="freset">Reset all filters</button>';
  fp.appendChild(resetRow);
  resetRow.querySelector('#freset').onclick=function(){
    for(var k in ranges){ranges[k].min=null;ranges[k].max=null;}
    must.beds4=must.sqft1800=must.go20=must.acre05=false;
    featText='';
    fp.querySelectorAll('.pin').forEach(function(i){i.value='';});
    mustBoxes.forEach(function(cb){cb.checked=false;});
    applyFilters();
  };

  hdr('Category');
  row('Gold (both 5)',true,function(v){catState.gold=v;applyFilters();},starsw('#f5b301'));
  row('Green (one 5)',true,function(v){catState.greenstar=v;applyFilters();},starsw('#2e9e2e'));
  row('Top 5 (system)',true,function(v){catState.top=v;applyFilters();},dot('#137333'));
  row('Bottom 5',true,function(v){catState.bottom=v;applyFilters();},dot('#c5221f'));
  row('Other',true,function(v){catState.other=v;applyFilters();},dot('#1a73e8'));
  row('Said no',true,function(v){catState.grey=v;applyFilters();},dot('#9e9e9e'));
  hdr('My rating (as "I am")');
  row('No rating yet',true,function(v){rateState.none=v;applyFilters();});
  row('1 star',true,function(v){rateState['1']=v;applyFilters();});
  row('2 stars',true,function(v){rateState['2']=v;applyFilters();});
  row('3 stars',true,function(v){rateState['3']=v;applyFilters();});
  row('4 stars',true,function(v){rateState['4']=v;applyFilters();});
  row('5 stars',true,function(v){rateState['5']=v;applyFilters();});
  hdr('Map layers');
  row('GO lines',true,function(v){showLines=v;applyFilters();});
  row('GO stations',true,function(v){showStn=v;applyFilters();});
  row('Highway 413',true,function(v){showHwy=v;applyFilters();});

  whoSel.addEventListener('change',applyFilters);
  applyFilters();
  if(b.length)map.fitBounds(b,{padding:[60,60],maxZoom:12});
}
render(DATA);
</script></body></html>
