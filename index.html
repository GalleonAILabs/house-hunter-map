<style>
html,body{margin:0;height:100%;font-family:-apple-system,Segoe UI,Roboto,sans-serif}
#map{height:100%;width:100%}
.panel{position:absolute;top:10px;right:10px;z-index:1000;background:#fff;padding:8px 12px;
border-radius:8px;box-shadow:0 1px 6px rgba(0,0,0,.3);font-size:14px;max-width:60vw}
.panel b{font-size:15px}
.panel select{font-size:14px;padding:2px}
.search{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:1000;
background:#fff;padding:6px 8px;border-radius:8px;box-shadow:0 1px 6px rgba(0,0,0,.3)}
.search input{font-size:14px;padding:4px 6px;width:200px;border:1px solid #ccc;border-radius:5px}
.search button{font-size:14px;padding:4px 8px;cursor:pointer;border:1px solid #ccc;
border-radius:5px;background:#f7f7f7;margin-left:4px}
.search .smsg{font-size:12px;color:#777;margin-left:6px}
.fit-pass{color:#137333;font-weight:600}
.leaflet-popup-content{font-size:13px;line-height:1.4}
.pop b{font-size:14px}
.pop img{width:240px;max-width:100%;margin-top:6px;border-radius:6px}
.stars{color:#f5b301;font-size:15px;letter-spacing:1px}
.legend{font-size:12px;color:#555}
.legend i{display:inline-block;width:10px;height:10px;border-radius:50%;margin:0 3px 0 8px}
.legend .st{width:auto;height:auto;border-radius:0;font-size:13px;line-height:1}
.pinstar{font-size:22px;line-height:22px;text-align:center;text-shadow:0 0 2px #fff,0 0 2px #fff}
.fpanel{position:absolute;bottom:18px;right:10px;z-index:1000;background:#fff;
border-radius:8px;box-shadow:0 1px 6px rgba(0,0,0,.3);font-size:13px;max-width:200px;
max-height:70vh;overflow:auto}
.ftitle{font-weight:600;padding:7px 10px;cursor:pointer;border-bottom:1px solid #eee;
position:sticky;top:0;background:#fff;border-radius:8px 8px 0 0}
#filterBody{padding:6px 10px 8px}
.fhdr{font-weight:600;color:#666;margin:7px 0 3px;font-size:12px}
.frow{display:flex;align-items:center;gap:5px;padding:2px 0;cursor:pointer}
.frow i{display:inline-block;width:11px;height:11px;border-radius:50%}
.frow i.stsw{width:auto;height:auto;border-radius:0;font-size:13px;line-height:1}
.fpanel.min #filterBody{display:none}

me": "Weston Road (RR 56)", "cross": "Weston Road & Major Mackenzie Drive, Vaughan", "muni": "Vaughan", "lat": 43.8442022, "lon": -79.5606602}, {"name": "Hwy 400", "cross": "Highway 400 & Kirby Road, Vaughan", "muni": "Vaughan", "lat": 43.7941544, "lon": -79.5268023}]};

var whoSel=document.getElementById('who');
whoSel.value=localStorage.getItem('hh_who')||'Mark';
whoSel.onchange=function(){localStorage.setItem('hh_who',whoSel.value);};
function WHO(){return whoSel.value;}

// Filter panel minimize toggle (starts minimized to stay out of the way).
var fpanel=document.getElementById('fpanel');
fpanel.classList.add('min');
document.getElementById('fchev').innerHTML='&#9654;';
document.getElementById('ftoggle').onclick=function(){
  var min=fpanel.classList.toggle('min');
  document.getElementById('fchev').innerHTML=min?'&#9654;':'&#9660;';
};

var map=L.map('map',{zoomControl:true}).setView([44.1,-79.6],9);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{attribution:'&copy; OpenStreetMap',maxZoom:19}).addTo(map);
var LC={'Barrie':'#0072C0','Lakeshore West':'#00B050','Lakeshore East':'#548235',
'Kitchener':'#7030A0','Milton':'#ED7D31','Richmond Hill':'#C00000','Stouffville':'#00B0B0'};
function e(s){return s==null?'':String(s);}
// Display stars: filled gold up to n, hollow to 5. Returns HTML.
function stars(n){n=parseInt(n,10);if(isNaN(n)||n<1)return '<span style="color:#bbb">no rating</span>';
  var s='';for(var i=1;i<=5;i++)s+=(i<=n?'\u2605':'\u2606');return '<span class="stars">'+s+'</span>';}

// Town/address search via OpenStreetMap Nominatim (free, no key). Pans the map.
var searchMarker=null;
function doSearch(){
  var q=document.getElementById('q').value.trim();if(!q)return;
  var sm=document.getElementById('smsg');sm.textContent=' searching...';
  var url='https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=ca&q='
    +encodeURIComponent(q+', Ontario, Canada');
  fetch(url).then(function(r){return r.json();}).then(function(j){
    if(!j.length){sm.textContent=' not found';return;}
    var la=parseFloat(j[0].lat),lo=parseFloat(j[0].lon);
    map.setView([la,lo],12);
    if(searchMarker)map.removeLayer(searchMarker);
    searchMarker=L.marker([la,lo]).addTo(map).bindPopup(e(j[0].display_name)).openPopup();
    sm.textContent='';
  }).catch(function(){sm.textContent=' search error';});
}
document.getElementById('qgo').onclick=doSearch;
document.getElementById('q').addEventListener('keydown',function(ev){if(ev.key==='Enter')doSearch();});
document.getElementById('qclear').onclick=function(){
  if(searchMarker){map.removeLayer(searchMarker);searchMarker=null;}
  document.getElementById('q').value='';document.getElementById('smsg').textContent='';
};

function render(data){
  var gProps=L.layerGroup().addTo(map),
      gLines=L.layerGroup().addTo(map), gStn=L.layerGroup().addTo(map),
      gHwy=L.layerGroup().addTo(map);
  var pins=[]; // {marker, tier, mark, katie}
  data.lines.forEach(function(ln){if(ln.points.length<2)return;
  L.polyline(ln.points,{color:LC[ln.name]||'#888',weight:4,opacity:.7})
  .bindPopup('<b>'+e(ln.name)+' line</b>').addTo(gLines);});
  data.stations.forEach(function(s){var c=s.existing?'#1a73e8':'#999';
  L.circleMarker([s.lat,s.lon],{radius:s.existing?5:4,color:c,fillColor:c,
  fillOpacity:s.existing?.9:.4,weight:1}).bindPopup('<b>'+e(s.name)+'</b><br>'+e(s.muni)
  +'<br><i>'+e(s.lines)+'</i>').addTo(gStn);});
  if(data.hwy413.length>1){var pts=data.hwy413.map(function(i){return[i.lat,i.lon];});
  L.polyline(pts,{color:'#ff6600',weight:5,opacity:.8,dashArray:'8,6'})
  .bindPopup('<b>Highway 413 (proposed)</b><br>Approximate corridor').addTo(gHwy);
  data.hwy413.forEach(function(i){L.circleMarker([i.lat,i.lon],{radius:4,color:'#ff6600',
  fillColor:'#ff6600',fillOpacity:.7,weight:1}).bindPopup('<b>'+e(i.name)+'</b><br>'
  +e(i.cross)+'<br>'+e(i.muni)).addTo(gHwy);});}

  var b=[];
  // Ranking key: START from the overall Fit Score (the pipeline's /8 scoring),
  // then layer Katie's and Mark's 5-star ratings on top to refine.
  //   base  = fit fraction * 10   (0-10, the foundation)
  //   bonus = avg of Mark/Katie stars (0-5, the human refinement)
  // Top 5 = highest combined, Bottom 5 = lowest. Rejected are grey and excluded.
  function fitFrac(p){
    var m=String(p.fit||'').match(/(\d+)\s*\/\s*(\d+)/);
    if(!m)return null; var n=parseFloat(m[1]),d=parseFloat(m[2]);
    return d>0?n/d:null;
  }
  function combined(p){
    var f=fitFrac(p);
    var mr=parseFloat(p.markRank), kr=parseFloat(p.katieRank), hv=[];
    if(!isNaN(mr))hv.push(mr); if(!isNaN(kr))hv.push(kr);
    var human=hv.length?hv.reduce(function(a,c){return a+c;},0)/hv.length:null;
    if(f==null && human==null) return null;
    return (f!=null?f*10:0) + (human!=null?human:0);
  }
  var ranked=data.properties.filter(function(p){
    var rej=String(p.status||'').toLowerCase().indexOf('reject')>=0;
    return !rej && combined(p)!=null;
  }).map(function(p){return {p:p,score:combined(p)};});
  var byHigh=ranked.slice().sort(function(a,c){return c.score-a.score;});
  var byLow=ranked.slice().sort(function(a,c){return a.score-c.score;});
  var topSet=new Set(byHigh.slice(0,5).map(function(x){return x.p;}));
  var botSet=new Set(byLow.slice(0,5).map(function(x){return x.p;}));
  botSet.forEach(function(p){if(topSet.has(p))botSet.delete(p);});

  data.properties.forEach(function(p){b.push([p.lat,p.lon]);
  var thisPin={marker:null,tier:null,
    mark:(p.markRank===''||p.markRank==null)?null:parseInt(p.markRank,10),
    katie:(p.katieRank===''||p.katieRank==null)?null:parseInt(p.katieRank,10)};
  var st=(p.status||'').toLowerCase();
  var rejected=(st.indexOf('reject')>=0||st.indexOf('pass')>=0||st==='no');
  var m5=parseInt(p.markRank,10)===5, k5=parseInt(p.katieRank,10)===5;
  var bothFive=!rejected&&m5&&k5, oneFive=!rejected&&(m5||k5)&&!bothFive;
  var isTop=topSet.has(p), isBot=botSet.has(p);
  var pc=rejected?'#9e9e9e':(isTop?'#137333':(isBot?'#c5221f':'#1a73e8'));
  var gm='https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(p.address);
  var fit=e(p.fit),fc=fit.indexOf('8/8')===0?' class="fit-pass"':'';
  var div=document.createElement('div');div.className='pop';
  div.innerHTML='<b>'+e(p.address)+'</b><br>Price: '+e(p.price)
  +'<br><span'+fc+'>Fit: '+fit+'</span><br>Beds: '+e(p.beds)+' &nbsp; Baths: '+e(p.baths)
  +'<br>Sqft: '+e(p.sqft)+' &nbsp; Lot: '+e(p.lot)+(p.acres?' ('+e(p.acres)+' ac)':'')
  +'<br>Nearest GO: '+e(p.go)+' ('+e(p.goMin)+' min)<br>'
  +(p.features?'Features: '+e(p.features)+'<br>':'')
  +'Due at closing: '+e(p.dueClosing)+'<br>Monthly PIT: '+e(p.pit)+'<br>'
  +'Katie: '+stars(p.katieRank)+' &nbsp; Mark: '+stars(p.markRank)+'<br>'
  +(p.link?'<a href="'+e(p.link)+'" target="_blank">Listing</a> ':'')
  +(p.doc?'| <a href="'+e(p.doc)+'" target="_blank">Research</a> ':'')
  +'| <a href="'+gm+'" target="_blank">Google Maps</a>'
  +(p.image?'<br><img src="'+e(p.image)+'">':'');
  var marker, tier;
  if(bothFive||oneFive){
    var col=bothFive?'#f5b301':'#2e9e2e';
    var icon=L.divIcon({className:'',iconSize:[24,24],iconAnchor:[12,12],
      html:'<div class="pinstar" style="color:'+col+'">\u2605</div>'});
    marker=L.marker([p.lat,p.lon],{icon:icon}).bindPopup(div);
    tier=bothFive?'gold':'greenstar';
  } else {
    marker=L.circleMarker([p.lat,p.lon],{radius:9,color:'#fff',weight:2,fillColor:pc,
    fillOpacity:rejected?0.55:1}).bindPopup(div);
    tier=rejected?'grey':(isTop?'top':(isBot?'bottom':'other'));
  }
  thisPin.marker=marker; thisPin.tier=tier;
  pins.push(thisPin);});

  // ---- Filter panel ------------------------------------------------------
  // Two filter dimensions, combined with AND:
  //   Category: gold / greenstar / top / bottom / other / grey
  //   My rating: no rating / 1..5 stars, for the CURRENT "I am" user.
  //             (Realtor has no personal ratings, so the rating filter is
  //             ignored when "I am: Realtor".)
  var catKeys=['gold','greenstar','top','bottom','other','grey'];
  var catState={}; catKeys.forEach(function(k){catState[k]=true;});
  var rateKeys=['none','1','2','3','4','5'];
  var rateState={}; rateKeys.forEach(function(k){rateState[k]=true;});
  var showLines=true, showStn=true, showHwy=true;

  function myRating(pin){
    var w=WHO();
    if(w==='Katie')return pin.katie;
    if(w==='Mark')return pin.mark;
    return undefined; // Realtor: no personal rating dimension
  }
  function applyFilters(){
    gProps.clearLayers();
    pins.forEach(function(pin){
      if(!catState[pin.tier])return;
      var mr=myRating(pin);
      if(mr!==undefined){
        var key=(mr==null||isNaN(mr))?'none':String(mr);
        if(!rateState[key])return;
      }
      gProps.addLayer(pin.marker);
    });
    if(showLines)gLines.addTo(map); else map.removeLayer(gLines);
    if(showStn)gStn.addTo(map); else map.removeLayer(gStn);
    if(showHwy)gHwy.addTo(map); else map.removeLayer(gHwy);
  }

  var fp=document.getElementById('filterBody');
  function row(label,checked,onchange,swatch){
    var d=document.createElement('label');d.className='frow';
    d.innerHTML='<input type="checkbox" '+(checked?'checked':'')+'> '
      +(swatch||'')+'<span>'+label+'</span>';
    d.querySelector('input').addEventListener('change',function(){onchange(this.checked);});
    fp.appendChild(d);return d;
  }
  function hdr(t){var d=document.createElement('div');d.className='fhdr';d.textContent=t;fp.appendChild(d);}
  function dot(c){return '<i style="background:'+c+'"></i>';}
  function starsw(c){return '<i class="stsw" style="color:'+c+'">\u2605</i>';}

  hdr('Category');
  row('Gold (both 5)',true,function(v){catState.gold=v;applyFilters();},starsw('#f5b301'));
  row('Green (one 5)',true,function(v){catState.greenstar=v;applyFilters();},starsw('#2e9e2e'));
  row('Top 5 (system)',true,function(v){catState.top=v;applyFilters();},dot('#137333'));
  row('Bottom 5',true,function(v){catState.bottom=v;applyFilters();},dot('#c5221f'));
  row('Other',true,function(v){catState.other=v;applyFilters();},dot('#1a73e8'));
  row('Said no',true,function(v){catState.grey=v;applyFilters();},dot('#9e9e9e'));
  hdr('My rating (as "I am")');
  row('No rating yet',true,function(v){rateState.none=v;applyFilters();});
  row('1 star',true,function(v){rateState['1']=v;applyFilters();});
  row('2 stars',true,function(v){rateState['2']=v;applyFilters();});
  row('3 stars',true,function(v){rateState['3']=v;applyFilters();});
  row('4 stars',true,function(v){rateState['4']=v;applyFilters();});
  row('5 stars',true,function(v){rateState['5']=v;applyFilters();});
  hdr('Map layers');
  row('GO lines',true,function(v){showLines=v;applyFilters();});
  row('GO stations',true,function(v){showStn=v;applyFilters();});
  row('Highway 413',true,function(v){showHwy=v;applyFilters();});

  whoSel.addEventListener('change',applyFilters);
  applyFilters();
  document.getElementById('count').textContent='('+data.properties.length+' properties)';
  if(b.length)map.fitBounds(b,{padding:[60,60],maxZoom:12});
}
render(DATA);
</script></body></html>
